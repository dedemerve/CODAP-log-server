<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>CODAP Arbor</title>
  <style>
    body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f0f4f8; }
    .box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 90%; }
    h2 { color: #2d3748; margin-bottom: 8px; }
    p { color: #718096; margin-bottom: 24px; }
    input { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 16px; box-sizing: border-box; margin-bottom: 16px; }
    input:focus { outline: none; border-color: #4299e1; }
    button { width: 100%; padding: 12px; background: #4299e1; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
    button:hover { background: #3182ce; }
  </style>
</head>
<body>
  <div class="box">
    <h2>Sınıflandırma ve Regresyon Ağacı</h2>
    <p>Lütfen adınızı ve soyadınızı girin.</p>
    <input type="text" id="name" placeholder="Ad Soyad" />
    <button onclick="start()">Başla</button>
  </div>
  <script>
    function start() {
      const name = document.getElementById('name').value.trim();
      if (!name) { alert('Lütfen adınızı girin.'); return; }
      const runKey = name.toLowerCase().replace(/\s+/g, '_');
      const codapUrl = 'https://codap.concord.org/releases/latest/static/dg/en/cert/index.html'
        + '?logEndpoint=https://codap-log-server.onrender.com/api/logs'
        + '&runKey=' + encodeURIComponent(runKey)
        + '&di=https://codap.xyz/plugins/arbor/';
      window.location.href = codapUrl;
    }
  </script>
</body>
</html>
