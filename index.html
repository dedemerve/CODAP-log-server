<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CODAP Arbor Araştırması</title>
<style>
  body{margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f0f4f8;font-family:-apple-system,BlinkMacSystemFont,sans-serif;}
  .box{background:#fff;border-radius:16px;padding:48px 40px;width:340px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.12);}
  h1{margin:0 0 8px;font-size:26px;color:#1a1a2e;}
  p{margin:0 0 24px;font-size:17px;color:#666;}
  input{width:100%;box-sizing:border-box;padding:12px 14px;font-size:18px;border:2px solid #dde;border-radius:10px;outline:none;margin-bottom:16px;}
  input:focus{border-color:#4a6fa5;}
  button{width:100%;padding:13px;font-size:18px;font-weight:700;color:#fff;background:#4a6fa5;border:none;border-radius:10px;cursor:pointer;}
  button:hover{background:#3a5a8f;}
  .err{color:#c0392b;font-size:14px;margin-top:8px;min-height:18px;}
</style>
</head>
<body>
<div class="box">
  <h1>CODAP Arbor</h1>
  <p>Sınıflandırma ve Regresyon Ağacı</p>
  <input id="name" type="text" placeholder="Adınızı ve soyadınızı yazın" autocomplete="off" maxlength="80"/>
  <button onclick="start()">Devam Et</button>
  <div class="err" id="err"></div>
</div>
<script>
  document.getElementById('name').focus();
  document.getElementById('name').addEventListener('keydown', function(e){
    if(e.key==='Enter') start();
  });

  function start() {
    var name = document.getElementById('name').value.trim();
    if (!name) {
      document.getElementById('err').textContent = 'Lütfen adınızı girin.';
      return;
    }
    // Supabase'e session_start logu gonder
    var SUPABASE_URL = 'https://jycizbiclzyjapmxntya.supabase.co';
    var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5Y2l6YmljbHp5amFwbXhudHlhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNzc3NTUsImV4cCI6MjA5MDY1Mzc1NX0.vKJZudpfFxX2RXIPtiO7IdSIkc1fPbGRcmnuFY18JLc';
    
    fetch(SUPABASE_URL+'/rest/v1/logs', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer '+SUPABASE_KEY,
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({
        student_id: name,
        action: 'session_start',
        timestamp_ms: 0,
        parameters: {student_id: name},
        raw_data: {}
      })
    }).then(function() {
      // CODAP'i orijinal Arbor ile ac, ogrenci adi URL parametresi olarak
      var codapUrl = 'https://codap.concord.org/app/static/dg/en/cert/index.html' +
        '?di=' + encodeURIComponent('https://dedemerve.github.io/CODAP-Arbor-log-server/arbor/index.html?studentId=' + name);
      window.location.href = codapUrl;
    }).catch(function() {
      // Hata olsa bile devam et
      var codapUrl = 'https://codap.concord.org/app/static/dg/en/cert/index.html' +
        '?di=' + encodeURIComponent('https://dedemerve.github.io/CODAP-Arbor-log-server/arbor/index.html?studentId=' + name);
      window.location.href = codapUrl;
    });
  }
</script>
</body>
</html>
